name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -project iLLM.xcodeproj

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project iLLM.xcodeproj \
            -scheme iLLM \
            -configuration Release \
            -archivePath iLLM.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -r iLLM.xcarchive/Products/Applications/iLLM.app Payload/
          zip -r iLLM.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iLLM-unsigned
          path: iLLM.ipa
