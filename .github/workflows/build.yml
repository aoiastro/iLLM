name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -project iLLM.xcodeproj

      - name: Build
        run: |
          xcodebuild build \
            -project iLLM.xcodeproj \
            -scheme iLLM \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath derived_data \
            -jobs 2 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -r derived_data/Build/Products/Release-iphoneos/iLLM.app Payload/
          zip -r iLLM.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iLLM-unsigned
          path: iLLM.ipa
